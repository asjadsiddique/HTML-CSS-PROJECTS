<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project-01</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto:ital,wght@0,100..900;1,100..900&family=Source+Sans+3:ital,wght@0,200..900;1,200..900&family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&display=swap');
</style>
<style>
    * {
        margin: 0;
        padding: 0;
        margin: auto;
    }

    body {
        background-color: white;
        padding: 50px;

    }

    .box {
        width: 300px;
        height: 420px;
        background-color: white;
        border-radius: 5px;
        box-shadow: 5px 5px 10px rgb(78, 102, 21);
        transition: transform 3s ease 1s;
       
    

    }
    .box:hover{
         transform: rotate(90deg) skew(20deg);
    }

    img {
        border-radius: 4px;
        border-bottom-left-radius: 0px;
        border-bottom-right-radius: 0px;
    }

    h3 {

        font-family: "Poppins", sans-serif;
        font-weight: 500;
        font-style: normal;
        font-size: 10px;
        /* padding:0px; */
        padding-top: 10px;
        padding-left: 12px;
        text-transform: uppercase;
        color: rgb(49, 49, 49);
    }

    .para {
        font-family: "Poppins", sans-serif;
        font-weight: 500;
        font-style: normal;
        color: rgb(49, 49, 49);
        padding: 0px;
        padding-left: 12px;
        padding-top: 0px;
        font-size: 18px;
    }

    .evergreen {
        padding-left: 12px;
        padding-top: 4px;
        padding-bottom: 10px;
        font-size: 14px;
        font-weight: 500;
        color: rgba(46, 46, 46, 0.801);
    }

    .info {
        display: flex;
        padding-bottom: 5px;
    }

    .bed {
        padding-left: 5px;
        
    }

    .bath {
        padding-right: 20px;
    }

    .wash {
        font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
        font-size: 14px;
        color: rgb(44, 43, 43);
    }

    i {
        font-size: 20px;
        color: #3498db;
        padding-top: 5px;
    }
    #unique{
        padding-left: 20px;
    }
   .profile{
  width: 50px;
  height: 50px;       /* make width = height */
  border-radius: 50%; /* use % instead of px */
  object-fit: cover;  /* crops the image neatly */

   }
  .nice{
    width: 200px;
    height: 70px;
    margin: 0;
    padding: 0;
    display: flex;
    padding-top: 0px;
  }
  .realtor{
    padding-top: 10px;
    padding-left: 15px;
     font-size: 14px;
        font-weight: 500;
        color: rgba(46, 46, 46, 0.801);
  }
  .name{
     font-size: 14px;
        font-weight: 500;
        color: rgba(46, 46, 46, 0.801);
        padding-left: 0px;
  }

</style>

<body>
    <div class="box">
        <div class="image ">
            <img width="300px"
                src="https://images.pexels.com/photos/280229/pexels-photo-280229.jpeg?_gl=1*1l9lz42*_ga*MTg1MzA0Mzc2OS4xNzU1ODExMzcw*_ga_8JE65Q40S6*czE3NTY0NDgxMDIkbzIkZzEkdDE3NTY0NDgxMTgkajQ0JGwwJGgw"
                alt="">
        </div>
        <div class="middle">
            <h3>Detached House. 5Y Old </h3>
            <p class="para"> $750,000</p>
            <p class="evergreen">742 Evergreen Terrace</p>
            <hr>
        </div>
        <div class="info">
            <i id="unique" class="fa-solid fa-bed"></i>
            <span class="bed wash">3 Bedrooms</span>
            <i class="fa-solid fa-bath"></i>
            <span class="bath wash">3 Bathrooms</span>
        </div>
        <hr>
         <p class="realtor">Realtor</p>
        <div class="nice" >
            
            <img class="profile"  src="IMG-20230321-WA0061_1.jpg" alt="">
              <p class="name">Muhammad Asjad <br>+92 337-46698-63
              </p>
              
              </div>
             
             
       


    </div>
</body>

</html>
